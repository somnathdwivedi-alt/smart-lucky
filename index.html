<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MarketyDeals — Discover the best digital marketing tools, affiliate programs, advertising platforms, exclusive deals and verified reviews."
    />
    <title>MarketyDeals — Best Marketing Deals, Tools & Affiliate Programs</title>
    <!-- Dark mode flash prevention: runs synchronously before first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
